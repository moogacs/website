# Regenerate js/books-data.json from Goodreads RSS (no browser CORS).
# Runs weekly; commit only when the snapshot changes.

name: Refresh Goodreads books

on:
  schedule:
    # Mondays 06:15 UTC (~weekly); edit cron if you prefer another day/time.
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-goodreads-books
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch shelves and write js/books-data.json
        run: python3 tools/fetch_goodreads_shelves.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/books-data.json
          if git diff --staged --quiet; then
            echo "No changes to books snapshot."
          else
            git commit -m "chore: refresh Goodreads books snapshot"
            git push
          fi
